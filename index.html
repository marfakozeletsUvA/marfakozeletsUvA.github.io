  <link rel="stylesheet" href="style.css">
  <style>
    :root { --accent: var(--purple); }
    .hero { display: grid; grid-template-columns: 1fr 1.2fr; min-height: calc(100vh - 60px); border-bottom: 1.5px solid var(--black); }
    .hero-left { padding: 64px 56px; display: flex; flex-direction: column; justify-content: center; border-right: 1.5px solid var(--black); }
    .hero-left h1 { font-size: clamp(20px, 2.4vw, 28px); font-weight: 800; line-height: 1.7; letter-spacing: -0.02em; color: var(--black); }
    .hero-left h1 .accent { color: var(--purple); }
    .hero-right { display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; background: #FAFAFA; }
    #brain-wrap { position: relative; width: 100%; max-width: 580px; }
    #brain-canvas { display: block; width: 100%; height: auto; cursor: default; }
    #brain-tooltip { position: absolute; font-size: 13px; font-weight: 800; padding: 8px 16px; border-radius: 2px; pointer-events: none; opacity: 0; transition: opacity 0.1s; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; transform: translate(-50%, -130%); }
    #brain-hint { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; margin-top: 10px; }
    .mobile-nav { display: none; padding: 32px 20px; border-bottom: 1.5px solid var(--black); }
    .mobile-nav a { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--rule); text-decoration: none; font-size: 16px; font-weight: 800; color: var(--black); }
    .mobile-nav a .dot { width: 12px; height: 12px; border-radius: 50%; }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-left { padding: 40px 20px; border-right: none; border-bottom: 1.5px solid var(--black); }
      .hero-right { display: none; }
      .mobile-nav { display: block; }
    }
  </style>
</head>
<body style="--accent: var(--purple);">

    <a href="index.html">home</a><a href="research.html">research</a><a href="projects.html">projects</a><a href="about.html">about</a><a href="contact.html">contact</a>

  <script>
    function toggleDrawer() { document.getElementById('mobileDrawer').classList.toggle('open'); }

    const canvas = document.getElementById('brain-canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('brain-tooltip');

    const LOBES = [
      { name: 'Research', color: '#E8829A', rgb: [232,130,154], href: 'research.html' },
      { name: 'Projects', color: '#F0A030', rgb: [240,160,48],  href: 'projects.html' },
      { name: 'About',    color: '#50C8D0', rgb: [80,200,208],  href: 'about.html' },
      { name: 'Contact',  color: '#9DC87A', rgb: [157,200,122], href: 'contact.html' },
      { name: 'Home',     color: '#9B7EC8', rgb: [155,126,200], href: 'index.html' },
    ];

    const img = new Image();
    img.src = 'brain.png';
    const lobeMasks = [];
    let cleanOff = null;

    function mkCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }

    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const w = canvas.width, h = canvas.height;

      // Clean (black bg removed)
      cleanOff = mkCanvas(w, h);
      const cc = cleanOff.getContext('2d');
      cc.drawImage(img, 0, 0);
      const cid = cc.getImageData(0, 0, w, h);
      strip(cid.data, null);
      cc.putImageData(cid, 0, 0);

      // Per-lobe masks
      LOBES.forEach(lobe => {
        const off = mkCanvas(w, h);
        const oc = off.getContext('2d');
        oc.drawImage(img, 0, 0);
        const id = oc.getImageData(0, 0, w, h);
        strip(id.data, lobe.rgb);
        oc.putImageData(id, 0, 0);
        lobeMasks.push({ lobe, off });
      });

      drawBrain(null);
    };

    function strip(d, targetRgb) {
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        // Remove black background
        if (r < 45 && g < 45 && b < 45) { d[i+3] = 0; continue; }
        // If a target colour is given, also remove pixels far from it
        if (targetRgb) {
          const dist = Math.sqrt((r-targetRgb[0])**2 + (g-targetRgb[1])**2 + (b-targetRgb[2])**2);
          if (dist > 95) d[i+3] = 0;
        }
      }
    }

    function getLobeAt(mx, my) {
      if (!lobeMasks.length) return null;
      const rect = canvas.getBoundingClientRect();
      const cx = Math.floor(mx * canvas.width / rect.width);
      const cy = Math.floor(my * canvas.height / rect.height);
      if (cx < 0 || cy < 0 || cx >= canvas.width || cy >= canvas.height) return null;
      for (const { lobe, off } of lobeMasks) {
        if (off.getContext('2d').getImageData(cx, cy, 1, 1).data[3] > 80) return lobe;
      }
      return null;
    }

    function drawBrain(active) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!cleanOff) return;
      if (!active) {
        ctx.drawImage(cleanOff, 0, 0);
      } else {
        ctx.globalAlpha = 0.25;
        ctx.drawImage(cleanOff, 0, 0);
        ctx.globalAlpha = 1;
        const m = lobeMasks.find(l => l.lobe.name === active.name);
        if (m) ctx.drawImage(m.off, 0, 0);
      }
    }

    let cur = null;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const lobe = getLobeAt(x, y);
      if (lobe !== cur) { cur = lobe; drawBrain(lobe); }
      if (lobe) {
        canvas.style.cursor = 'pointer';
        tooltip.style.opacity = '1';
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
        tooltip.textContent = lobe.name;
        tooltip.style.background = lobe.color;
        tooltip.style.color = '#1A1A1A';
      } else {
        canvas.style.cursor = 'default';
        tooltip.style.opacity = '0';
      }
    });
    canvas.addEventListener('mouseleave', () => { cur = null; tooltip.style.opacity = '0'; canvas.style.cursor = 'default'; drawBrain(null); });
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const lobe = getLobeAt(e.clientX - rect.left, e.clientY - rect.top);
      if (lobe) window.location.href = lobe.href;
    });
  </script>
</body>
