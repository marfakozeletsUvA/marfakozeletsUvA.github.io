  <link rel="stylesheet" href="style.css">
  <style>
    :root { --accent: var(--purple); }
    .hero { display: grid; grid-template-columns: 1fr 1.2fr; min-height: calc(100vh - 60px); border-bottom: 1.5px solid var(--black); }
    .hero-left { padding: 64px 56px; display: flex; flex-direction: column; justify-content: center; border-right: 1.5px solid var(--black); }
    .hero-left h1 { font-size: clamp(20px, 2.4vw, 28px); font-weight: 800; line-height: 1.7; letter-spacing: -0.02em; color: var(--black); }
    .hero-left h1 .accent { color: var(--purple); }
    .hero-right { display: flex; align-items: center; justify-content: center; padding: 40px; background: #FAFAFA; position: relative; }
    #brain-wrap { position: relative; width: 100%; max-width: 580px; }

    /* Full brain display image — black bg removed via multiply */
    #brain-display {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
    }

    /* Lobe hit-test images — stacked exactly over brain, invisible, used only for JS hit detection */
    .lobe-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      opacity: 0;
      pointer-events: none;
    }

    /* Highlight overlay — shown on hover, multiply removes black */
    #lobe-highlight {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 2;
      pointer-events: none;
    }

    /* Dim layer shown on hover to fade non-active lobes */
    #brain-dim {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 0;
      pointer-events: none;
    }

    #brain-tooltip {
      position: absolute;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 16px;
      border-radius: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      transform: translate(-50%, -130%);
      z-index: 10;
    }
    #brain-hint { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; margin-top: 10px; }
    #brain-hitarea { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; z-index: 5; }

    .mobile-nav { display: none; padding: 32px 20px; border-bottom: 1.5px solid var(--black); }
    .mobile-nav a { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--rule); text-decoration: none; font-size: 16px; font-weight: 800; color: var(--black); }
    .mobile-nav a .dot { width: 12px; height: 12px; border-radius: 50%; }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-left { padding: 40px 20px; border-right: none; border-bottom: 1.5px solid var(--black); }
      .hero-right { display: none; }
      .mobile-nav { display: block; }
    }
  </style>
</head>

        <img class="lobe-img" id="lobe-projects" src="assets/images/site/parietal-brain.png" alt="">

  <script>
    function toggleDrawer() { document.getElementById('mobileDrawer').classList.toggle('open'); }

    const LOBES = [
      { id: 'lobe-research', name: 'Research', color: '#E8829A', href: 'research.html' },
      { id: 'lobe-projects', name: 'Projects',  color: '#F0A030', href: 'projects.html' },
      { id: 'lobe-about',    name: 'About',     color: '#50C8D0', href: 'about.html' },
      { id: 'lobe-contact',  name: 'Contact',   color: '#9DC87A', href: 'contact.html' },
      { id: 'lobe-home',     name: 'Home',      color: '#9B7EC8', href: 'index.html' },
    ];

    const hitCanvas = document.getElementById('brain-hitarea');
    const hitCtx = hitCanvas.getContext('2d', { willReadFrequently: true });
    const tooltip = document.getElementById('brain-tooltip');
    const highlight = document.getElementById('lobe-highlight');
    const brainDisplay = document.getElementById('brain-display');

    // Build offscreen canvases for each lobe for hit testing
    const lobeData = [];
    let loadedCount = 0;
    const totalLobes = LOBES.length;

    LOBES.forEach(lobe => {
      const img = document.getElementById(lobe.id);
      const off = document.createElement('canvas');
      const entry = { lobe, img, off, ctx: null };
      lobeData.push(entry);

      function onLoad() {
        off.width = img.naturalWidth;
        off.height = img.naturalHeight;
        const c = off.getContext('2d', { willReadFrequently: true });
        c.drawImage(img, 0, 0);
        entry.ctx = c;
        loadedCount++;
        if (loadedCount === totalLobes) onAllLoaded();
      }

      if (img.complete && img.naturalWidth > 0) onLoad();
      else img.addEventListener('load', onLoad);
    });

    function onAllLoaded() {
      // Size hit canvas to match display
      const w = brainDisplay.naturalWidth;
      const h = brainDisplay.naturalHeight;
      hitCanvas.width = w;
      hitCanvas.height = h;
      hitCanvas.style.width = '100%';
      hitCanvas.style.height = 'auto';
    }

    function getLobeAt(mx, my) {
      const rect = hitCanvas.getBoundingClientRect();
      const scaleX = hitCanvas.width / rect.width;
      const scaleY = hitCanvas.height / rect.height;
      const cx = Math.floor(mx * scaleX);
      const cy = Math.floor(my * scaleY);
      if (cx < 0 || cy < 0 || cx >= hitCanvas.width || cy >= hitCanvas.height) return null;

      for (const { lobe, off, ctx } of lobeData) {
        if (!ctx) continue;
        // Sample pixel from this lobe's offscreen canvas
        const pixel = ctx.getImageData(cx, cy, 1, 1).data;
        // Lobe is here if pixel is not black background (r>50 OR g>50 OR b>50) and alpha > 0
        if (pixel[3] > 20 && (pixel[0] > 50 || pixel[1] > 50 || pixel[2] > 50)) {
          return lobe;
        }
      }
      return null;
    }

    let currentLobe = null;

    hitCanvas.addEventListener('mousemove', e => {
      const rect = hitCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const lobe = getLobeAt(x, y);

      if (lobe !== currentLobe) {
        currentLobe = lobe;
        if (lobe) {
          // Show the lobe highlight image (with multiply it removes black bg)
          highlight.src = document.getElementById(lobe.id).src;
          highlight.style.opacity = '1';
          brainDisplay.style.opacity = '0.3';
        } else {
          highlight.style.opacity = '0';
          brainDisplay.style.opacity = '1';
        }
      }

      if (lobe) {
        hitCanvas.style.cursor = 'pointer';
        tooltip.style.opacity = '1';
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
        tooltip.textContent = lobe.name;
        tooltip.style.background = lobe.color;
        tooltip.style.color = '#1A1A1A';
      } else {
        hitCanvas.style.cursor = 'default';
        tooltip.style.opacity = '0';
      }
    });

    hitCanvas.addEventListener('mouseleave', () => {
      currentLobe = null;
      highlight.style.opacity = '0';
      brainDisplay.style.opacity = '1';
      tooltip.style.opacity = '0';
      hitCanvas.style.cursor = 'default';
    });

    hitCanvas.addEventListener('click', e => {
      const rect = hitCanvas.getBoundingClientRect();
      const lobe = getLobeAt(e.clientX - rect.left, e.clientY - rect.top);
      if (lobe) window.location.href = lobe.href;
    });
  </script>
</body>
